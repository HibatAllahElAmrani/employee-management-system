spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update

# this setting instructs Hibernate to perform two main tasks automatically:
#1.Creation: It automatically creates database tables if they do
# not already exist in the database
#2.Updates: If there are any changes in the JPA entities (such as new
# fields), it tells Hibernate to update those corresponding changes
# in the database tables as well